# ? Application Information
# ==============================
spring.application.name=syndico-app
server.port=8080
server.servlet.context-path=/syndico


# ?? Database Configuration (MySQL)
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/syndico_db?createDatabaseIfNotExist=true&zeroDateTimeBehavior=CONVERT_TO_NULL
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ?? JPA / Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true


# ? File Uploads (Optional)
# ==============================
file.upload-dir=uploads
app.storage.max-file-size-mb=10
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# ? Logging
# ==============================
logging.level.root=INFO
logging.level.com.syndico=DEBUG
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n


# ? Thymeleaf
# ==============================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

