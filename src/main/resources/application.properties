# ? Application Configuration
# ==============================
spring.application.name=syndico-app
server.port=8080
server.servlet.context-path=/
server.error.whitelabel.enabled=false

# ?? Database Configuration (MySQL)
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/syndico_db?createDatabaseIfNotExist=true&zeroDateTimeBehavior=CONVERT_TO_NULL
spring.datasource.username=root
spring.datasource.password=Zekaoui@2004
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ?? JPA / Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.jpa.open-in-view=false

# ? THYMELEAF CONFIGURATION
# =============================
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# ? File Uploads (Optional)
# ==============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB

# Upload Directory
syndicoapp.upload.dir=uploads/

# Internationalisation
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# ? Logging
# ==============================
logging.level.root=INFO
logging.level.com.syndico.syndicoapp=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ? EMAIL CONFIGURATION (SMTP)
# ============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Email Sender
syndicoapp.email.from=noreply@syndico.ma
syndicoapp.email.name=Syndico Support

# ? TWILIO SMS CONFIGURATION (Optional)
# ============================================
twilio.account.sid=your_account_sid
twilio.auth.token=your_auth_token
twilio.phone.number=+1234567890

# ? STRIPE PAYMENT CONFIGURATION
# ============================================
stripe.api.key=your_stripe_secret_key
stripe.webhook.secret=your_webhook_secret

# ============================================
# APPLICATION CUSTOM PROPERTIES
# ============================================
# Base URL
syndicoapp.base.url=http://localhost:8080

# Default Language
syndicoapp.default.language=En

# Session Timeout (30 minutes)
server.servlet.session.timeout=30m

# Email Verification
syndicoapp.email.verification.enabled=true
syndicoapp.email.verification.token.expiration=86400000

# Password Reset
syndicoapp.password.reset.token.expiration=3600000

# ============================================
# SECURITY CONFIGURATION
# ============================================
# BCrypt strength (4-31, default 10)
syndicoapp.security.bcrypt.strength=12

# ============================================
# ACTUATOR (OPTIONAL - for monitoring)
# ============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ============================================
# DEVTOOLS (Development only)
# ============================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
