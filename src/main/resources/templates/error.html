<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Erreur - Syndico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="alert alert-danger">
        <h1>⚠️ Erreur</h1>
        <p><strong>Statut:</strong> <span th:text="${status}">500</span></p>
        <p><strong>Message:</strong> <span th:text="${error}">Une erreur est survenue</span></p>
        <p><strong>Path:</strong> <span th:text="${path}">/</span></p>
        <hr>
        <p><strong>Exception:</strong> <span th:text="${message}">Détails de l'erreur</span></p>
        <hr>
        <a href="/" class="btn btn-primary">Retour à l'accueil</a>
    </div>
</div>
</body>
</html>
