<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Syndico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body text-center p-5">
                        <i class="bi bi-exclamation-triangle-fill text-warning" style="font-size: 4rem;"></i>
                        <h1 class="mt-4">Oops! Something went wrong</h1>
                        <p class="text-muted mb-4">We encountered an error while processing your request.</p>

                        <div class="alert alert-danger text-start" th:if="${error}">
                            <strong>Error:</strong> <span th:text="${error}">Unknown error</span>
                        </div>

                        <div class="alert alert-info text-start" th:if="${message}">
                            <span th:text="${message}">Error message</span>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <a href="javascript:history.back()" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Go Back
                            </a>
                            <a th:href="@{/}" class="btn btn-primary">
                                <i class="bi bi-house"></i> Go to Home
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
