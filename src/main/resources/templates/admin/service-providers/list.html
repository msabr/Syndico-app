<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/Header :: head}"></head>
<link rel="stylesheet" th:href="@{/css/admin/operations/serviceList.css}">

<body>

<header th:replace="~{fragments/Header :: header(activePage='none')}"></header>
<aside th:replace="~{fragments/AdminSidebar :: admin-sidebar(activePage='service-providers')}"></aside>

<div class="main-content">

    <div class="container-fluid px-4 py-4">
        <!-- Page Header -->
        <div class="page-header">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="mb-2"><i class="fas fa-user-tie me-2"></i>Service Providers</h2>
                    <p class="mb-0">Manage service providers and contractors</p>
                </div>
                <button class="btn btn-light btn-lg" data-bs-toggle="modal" data-bs-target="#createProviderModal">
                    <i class="fas fa-plus me-2"></i>New Provider
                </button>
            </div>
        </div>

        <!-- Alert Messages -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Statistics Cards -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="stat-card stat-card-primary position-relative">
                    <h6 class="text-uppercase mb-2">Total Providers</h6>
                    <h3 class="mb-0" th:text="${statistics.totalPrestataires}">0</h3>
                    <i class="fas fa-users stat-icon"></i>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card stat-card-success position-relative">
                    <h6 class="text-uppercase mb-2">Active</h6>
                    <h3 class="mb-0" th:text="${statistics.activePrestataires}">0</h3>
                    <i class="fas fa-check-circle stat-icon"></i>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card stat-card-warning position-relative">
                    <h6 class="text-uppercase mb-2">Average Rating</h6>
                    <h3 class="mb-0" th:text="${#numbers.formatDecimal(statistics.averageRating, 0, 1)}">0.0</h3>
                    <small>out of 5.0</small>
                    <i class="fas fa-star stat-icon"></i>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card stat-card-info position-relative">
                    <h6 class="text-uppercase mb-2">Top Rated (≥4.0)</h6>
                    <h3 class="mb-0" th:text="${statistics.topRatedCount}">0</h3>
                    <i class="fas fa-award stat-icon"></i>
                </div>
            </div>
        </div>

        <!-- Filter Section -->
        <div class="filter-section">
            <form th:action="@{/admin/service-providers}" method="get" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Filter by Specialty</label>
                    <select name="specialty" class="form-select" onchange="this.form.submit()">
                        <option value="">All Specialties</option>
                        <option th:each="spec : ${specialties}"
                                th:value="${spec}"
                                th:text="${spec}"
                                th:selected="${spec == selectedSpecialty}"></option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Search by Company Name</label>
                    <input type="text" name="search" class="form-control"
                           placeholder="Enter company name..." th:value="${searchQuery}">
                </div>
                <div class="col-md-4 d-flex align-items-end gap-2">
                    <button type="submit" class="btn btn-primary flex-grow-1">
                        <i class="fas fa-search me-2"></i>Search
                    </button>
                    <a th:href="@{/admin/service-providers}" class="btn btn-secondary">
                        <i class="fas fa-redo"></i>
                    </a>
                </div>
            </form>
        </div>

        <!-- Providers Grid -->
        <div class="row">
            <div class="col-12" th:if="${prestataires.isEmpty()}">
                <div class="text-center py-5">
                    <i class="fas fa-hard-hat fa-4x text-muted mb-3"></i>
                    <p class="text-muted">No service providers found</p>
                </div>
            </div>

            <div class="col-md-6 col-lg-4" th:each="provider : ${prestataires}">
                <div class="provider-card">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div class="flex-grow-1">
                            <h5 class="mb-1" th:text="${provider.companyName}">Company Name</h5>
                            <span class="badge bg-secondary" th:text="${provider.specialty}">Specialty</span>
                        </div>
                        <span th:class="${provider.isActive ? 'badge badge-active' : 'badge badge-inactive'}">
                            <span th:text="${provider.isActive ? 'Active' : 'Inactive'}">Active</span>
                        </span>
                    </div>

                    <div class="mb-3">
                        <div class="rating-stars mb-2">
                            <span th:each="star : ${#numbers.sequence(1, 5)}">
                                <i th:class="${star <= provider.rating ? 'fas fa-star' : 'far fa-star'}"></i>
                            </span>
                            <span class="ms-2 text-muted" th:text="${#numbers.formatDecimal(provider.rating, 0, 1)}">0.0</span>
                        </div>
                    </div>

                    <div class="mb-2" th:if="${provider.contactPerson != null}">
                        <i class="fas fa-user me-2 text-muted"></i>
                        <span th:text="${provider.contactPerson}">Contact Person</span>
                    </div>

                    <div class="mb-2">
                        <i class="fas fa-phone me-2 text-muted"></i>
                        <span th:text="${provider.phoneNumber}">Phone</span>
                    </div>

                    <div class="mb-3">
                        <i class="fas fa-envelope me-2 text-muted"></i>
                        <span th:text="${provider.email}">Email</span>
                    </div>

                    <div class="d-flex gap-2">
                        <button class="btn btn-sm btn-primary flex-grow-1"
                                data-bs-toggle="modal"
                                th:data-bs-target="'#editModal' + ${provider.id}">
                            <i class="fas fa-edit"></i> Edit
                        </button>

                        <button class="btn btn-sm btn-warning"
                                data-bs-toggle="modal"
                                th:data-bs-target="'#ratingModal' + ${provider.id}">
                            <i class="fas fa-star"></i>
                        </button>

                        <form method="post" th:action="@{/admin/service-providers/{id}/toggle-status(id=${provider.id})}"
                              style="display: inline;">
                            <button type="submit" class="btn btn-sm btn-secondary">
                                <i th:class="${provider.isActive ? 'fas fa-eye-slash' : 'fas fa-eye'}"></i>
                            </button>
                        </form>

                        <form method="post" th:action="@{/admin/service-providers/delete/{id}(id=${provider.id})}"
                              style="display: inline;"
                              onsubmit="return confirm('Delete this provider?');">
                            <button type="submit" class="btn btn-sm btn-danger">
                                <i class="fas fa-trash"></i>
                            </button>
                        </form>
                    </div>

                    <!-- Edit Modal -->
                    <div class="modal fade" th:id="'editModal' + ${provider.id}" tabindex="-1">
                        <div class="modal-dialog modal-lg">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h5 class="modal-title">Edit Service Provider</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                </div>
                                <form method="post" th:action="@{/admin/service-providers/update/{id}(id=${provider.id})}">
                                    <div class="modal-body">
                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Company Name *</label>
                                                <input type="text" name="companyName" class="form-control"
                                                       th:value="${provider.companyName}" required>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Contact Person</label>
                                                <input type="text" name="contactPerson" class="form-control"
                                                       th:value="${provider.contactPerson}">
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Email *</label>
                                                <input type="email" name="email" class="form-control"
                                                       th:value="${provider.email}" required>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Phone</label>
                                                <input type="tel" name="phoneNumber" class="form-control"
                                                       th:value="${provider.phoneNumber}">
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Specialty</label>
                                                <input type="text" name="specialty" class="form-control"
                                                       th:value="${provider.specialty}">
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Status</label>
                                                <select name="isActive" class="form-select">
                                                    <option value="true" th:selected="${provider.isActive}">Active</option>
                                                    <option value="false" th:selected="${!provider.isActive}">Inactive</option>
                                                </select>
                                            </div>
                                            <div class="col-12 mb-3">
                                                <label class="form-label">Address</label>
                                                <textarea name="address" class="form-control" rows="2"
                                                          th:text="${provider.address}"></textarea>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="modal-footer">
                                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                        <button type="submit" class="btn btn-primary">Save Changes</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- Rating Modal -->
                    <div class="modal fade" th:id="'ratingModal' + ${provider.id}" tabindex="-1">
                        <div class="modal-dialog">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h5 class="modal-title">Update Rating</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                </div>
                                <form method="post" th:action="@{/admin/service-providers/{id}/update-rating(id=${provider.id})}">
                                    <div class="modal-body">
                                        <label class="form-label">Rating (0.0 - 5.0)</label>
                                        <input type="number" name="rating" class="form-control"
                                               step="0.1" min="0" max="5"
                                               th:value="${provider.rating}" required>
                                    </div>
                                    <div class="modal-footer">
                                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                        <button type="submit" class="btn btn-warning">Update Rating</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Create Provider Modal -->
<div class="modal fade" id="createProviderModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">New Service Provider</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form method="post" th:action="@{/admin/service-providers/create}">
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Company Name *</label>
                            <input type="text" name="companyName" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Contact Person</label>
                            <input type="text" name="contactPerson" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email *</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" name="phoneNumber" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Specialty</label>
                            <input type="text" name="specialty" class="form-control"
                                   placeholder="e.g., Plumber, Electrician">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Initial Rating</label>
                            <input type="number" name="rating" class="form-control"
                                   step="0.1" min="0" max="5" value="0.0">
                        </div>
                        <div class="col-12 mb-3">
                            <label class="form-label">Address</label>
                            <textarea name="address" class="form-control" rows="2"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Provider</button>
                </div>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/AdminSidebar :: mini-footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin/admin-pages.js}"></script>
</body>
</html>
