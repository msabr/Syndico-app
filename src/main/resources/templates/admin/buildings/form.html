<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/Header :: head}"></head>
<link rel="stylesheet" th:href="@{/css/admin/admin-pages.css}">
<body>

<header th:replace="~{fragments/Header :: header(activePage='none')}"></header>
<aside th:replace="~{fragments/AdminSidebar :: admin-sidebar(activePage='buildings')}"></aside>

<div class="admin-container">

    <main class="admin-main-content">
        <div class="page-header">
            <div>
                <h1 class="page-title">
                    <i class="fas fa-building"></i>
                    <span th:text="${building.id != null} ? 'Edit Building' : 'New Building'">New Building</span>
                </h1>
                <p class="page-subtitle" th:text="${building.id != null} ? 'Update building information' : 'Fill in the details to create a new building'">
                    Fill in the details to create a new building
                </p>
            </div>
            <a th:href="@{/admin/buildings}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i>Back to List
            </a>
        </div>

        <!-- Error Messages -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="form-card">
            <form th:action="@{/admin/buildings/save}" th:object="${building}" method="post">
                <input type="hidden" th:field="*{id}">

                <!-- Basic Information Section -->
                <div class="form-section">
                    <h5 class="section-title">
                        <i class="fas fa-info-circle"></i>
                        Basic Information
                    </h5>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">
                                Building Name <span class="text-danger">*</span>
                            </label>
                            <input type="text"
                                   th:field="*{name}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"
                                   placeholder="Enter building name"
                                   required>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">
                                Address <span class="text-danger">*</span>
                            </label>
                            <input type="text"
                                   th:field="*{address}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('address')} ? 'is-invalid' : ''"
                                   placeholder="Enter building address"
                                   required>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
                        </div>
                    </div>
                </div>

                <!-- Building Details Section -->
                <div class="form-section">
                    <h5 class="section-title">
                        <i class="fas fa-building"></i>
                        Building Details
                    </h5>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">
                                <i class="fas fa-layer-group"></i> Number of Floors
                            </label>
                            <input type="number"
                                   th:field="*{numberOfFloors}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('numberOfFloors')} ? 'is-invalid' : ''"
                                   placeholder="e.g., 5"
                                   min="1">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('numberOfFloors')}" th:errors="*{numberOfFloors}"></div>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label class="form-label">
                                <i class="fas fa-door-open"></i> Number of Apartments
                            </label>
                            <input type="number"
                                   th:field="*{numberOfApartments}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('numberOfApartments')} ? 'is-invalid' : ''"
                                   placeholder="e.g., 20"
                                   min="1">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('numberOfApartments')}" th:errors="*{numberOfApartments}"></div>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label class="form-label">
                                <i class="fas fa-calendar-alt"></i> Year Built
                            </label>
                            <input type="number"
                                   th:field="*{yearBuilt}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('yearBuilt')} ? 'is-invalid' : ''"
                                   placeholder="e.g., 2020"
                                   min="1800"
                                   max="2100">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('yearBuilt')}" th:errors="*{yearBuilt}"></div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-align-left"></i> Description
                        </label>
                        <textarea th:field="*{description}"
                                  class="form-control"
                                  th:classappend="${#fields.hasErrors('description')} ? 'is-invalid' : ''"
                                  rows="4"
                                  placeholder="Enter a description for this building..."></textarea>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i>Save Building
                    </button>
                    <a th:href="@{/admin/buildings}" class="btn btn-secondary">
                        <i class="fas fa-times"></i>Cancel
                    </a>
                </div>
            </form>
        </div>
    </main>
</div>

<footer th:replace="~{fragments/AdminSidebar :: mini-footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin/admin-pages.js}"></script>
</body>
</html>
