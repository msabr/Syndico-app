<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/Header :: head}"></head>
<link rel="stylesheet" th:href="@{/css/admin/residents.css}">

<body>

<header th:replace="~{fragments/Header :: header(activePage='none')}"></header>
<aside th:replace="~{fragments/AdminSidebar :: admin-sidebar(activePage='buildings')}"></aside>

<div class="main-content">
    <main class="container-fluid">
        <!-- Page Header with Gradient -->
        <div class="page-header-gradient">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="page-title">
                        <i class="bi bi-building"></i> Buildings Management
                    </h1>
                    <p class="page-subtitle">Manage all buildings in the syndicate</p>
                </div>
                <a th:href="@{/admin/buildings/new}" class="btn btn-primary btn-lg">
                    <i class="bi bi-plus-circle"></i> Add New Building
                </a>
            </div>
        </div>

        <!-- Alert Messages -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mt-3" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show mt-3" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Buildings Table Card -->
        <div class="card shadow-sm mt-4">
            <div class="card-body">
                <!-- Empty State -->
                <div th:if="${#lists.isEmpty(buildings)}" class="text-center py-5">
                    <i class="bi bi-building" style="font-size: 4rem; color: #d4a574;"></i>
                    <h3 class="mt-3">No Buildings Found</h3>
                    <p class="text-muted">Start by adding your first building to the system.</p>
                    <a th:href="@{/admin/buildings/new}" class="btn btn-primary mt-3">
                        <i class="bi bi-plus-circle"></i> Add First Building
                    </a>
                </div>

                <!-- Buildings Table -->
                <div th:unless="${#lists.isEmpty(buildings)}" class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                        <tr>
                            <th scope="col" class="text-center">#</th>
                            <th scope="col">Name</th>
                            <th scope="col">Address</th>
                            <th scope="col" class="text-center">Floors</th>
                            <th scope="col" class="text-center">Apartments</th>
                            <th scope="col" class="text-center">Year Built</th>
                            <th scope="col" class="text-center">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="building, iterStat : ${buildings}">
                            <td class="text-center" th:text="${iterStat.count}">1</td>
                            <td>
                                <strong th:text="${building.name}">Building A</strong>
                            </td>
                            <td th:text="${building.address}">123 Main St</td>
                            <td class="text-center">
                                <span class="badge bg-info" th:text="${building.numberOfFloors}">5</span>
                            </td>
                            <td class="text-center">
                                <span class="badge bg-primary" th:text="${building.numberOfApartments}">20</span>
                            </td>
                            <td class="text-center" th:text="${building.yearBuilt}">2020</td>
                            <td class="text-center">
                                <div class="btn-group" role="group">
                                    <a th:href="@{/admin/buildings/edit/{id}(id=${building.id})}"
                                       class="btn btn-sm btn-outline-warning"
                                       title="Edit Building">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{/admin/buildings/delete/{id}(id=${building.id})}"
                                       class="btn btn-sm btn-outline-danger"
                                       title="Delete Building"
                                       onclick="return confirm('Are you sure you want to delete this building?')">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<footer th:replace="~{fragments/AdminSidebar :: mini-footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
