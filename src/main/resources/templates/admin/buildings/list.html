<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/Header :: head}"></head>
<link rel="stylesheet" th:href="@{/css/admin/admin-pages.css}">

<body>

<header th:replace="~{fragments/Header :: header(activePage='none')}"></header>
<aside th:replace="~{fragments/AdminSidebar :: admin-sidebar(activePage='buildings')}"></aside>

<div class="main-content">

    <div class="container-fluid px-4 py-4">
        <!-- Page Header -->
        <div class="page-header">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="mb-2"><i class="fas fa-building me-2"></i>Buildings Management</h2>
                    <p class="mb-0">Manage all buildings in the syndicate</p>
                </div>
                <a th:href="@{/admin/buildings/new}" class="btn btn-light btn-lg">
                    <i class="fas fa-plus me-2"></i>Add New Building
                </a>
            </div>
        </div>

        <!-- Alert Messages -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Buildings Table -->
        <div class="card">
            <div class="card-body">
                <div th:if="${#lists.isEmpty(buildings)}" class="empty-state">
                    <i class="fas fa-building"></i>
                    <h3>No Buildings Found</h3>
                    <p>Start by adding your first building to the system.</p>
                    <a th:href="@{/admin/buildings/new}" class="btn btn-primary">
                        <i class="fas fa-plus"></i>Add First Building
                    </a>
                </div>

                <div th:unless="${#lists.isEmpty(buildings)}" class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Address</th>
                            <th>Floors</th>
                            <th>Apartments</th>
                            <th>Year Built</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="building : ${buildings}">
                            <td th:text="${building.id}" data-label="ID">1</td>
                            <td th:text="${building.name}" data-label="Name">Building A</td>
                            <td th:text="${building.address}" data-label="Address">123 Main St</td>
                            <td th:text="${building.numberOfFloors}" data-label="Floors">5</td>
                            <td th:text="${building.numberOfApartments}" data-label="Apartments">20</td>
                            <td th:text="${building.yearBuilt}" data-label="Year Built">2020</td>
                            <td data-label="Actions">
                                <a th:href="@{/admin/buildings/edit/{id}(id=${building.id})}"
                                   class="btn btn-sm btn-warning"
                                   title="Edit Building">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <a th:href="@{/admin/buildings/delete/{id}(id=${building.id})}"
                                   class="btn btn-sm btn-danger"
                                   title="Delete Building"
                                   onclick="return confirm('Are you sure you want to delete this building?')">
                                    <i class="fas fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/AdminSidebar :: mini-footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin/admin-pages.js}"></script>
</body>
</html>
