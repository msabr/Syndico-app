<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/Header :: head}"></head>
<link rel="stylesheet" th:href="@{/css/admin/admin-pages.css}">

<body>

<header th:replace="~{fragments/Header :: header(activePage='none')}"></header>
<aside th:replace="~{fragments/AdminSidebar :: admin-sidebar(activePage='work-projects')}"></aside>

<div class="admin-container">
    <main class="admin-main-content">
        <div class="page-header">
            <div>
                <h1 class="page-title">
                    <i class="fas fa-hard-hat"></i>
                    <span th:text="${workProject.id != null} ? 'Edit Work Project' : 'New Work Project'">New Work Project</span>
                </h1>
                <p class="page-subtitle" th:text="${workProject.id != null} ? 'Update work project information' : 'Fill in the details to create a new work project'">
                    Fill in the details to create a new work project
                </p>
            </div>
            <a th:href="@{/admin/work-projects}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i>Back to List
            </a>
        </div>

        <!-- Error Messages -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="form-card">
            <form th:action="${workProject.id != null} ? @{/admin/work-projects/update/{id}(id=${workProject.id})} : @{/admin/work-projects/create}"
                  th:object="${workProject}"
                  method="post">

                <!-- Basic Information -->
                <div class="form-section">
                    <h5 class="section-title">
                        <i class="fas fa-info-circle"></i>
                        Basic Information
                    </h5>

                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label class="form-label">
                                <i class="fas fa-heading"></i> Project Title <span class="text-danger">*</span>
                            </label>
                            <input type="text"
                                   th:field="*{title}"
                                   class="form-control"
                                   placeholder="e.g., Building Renovation 2024"
                                   required>
                        </div>

                        <div class="col-md-12 mb-3">
                            <label class="form-label">
                                <i class="fas fa-align-left"></i> Description
                            </label>
                            <textarea th:field="*{description}"
                                      class="form-control"
                                      rows="4"
                                      placeholder="Describe the work project..."></textarea>
                        </div>
                    </div>
                </div>

                <!-- Project Details -->
                <div class="form-section">
                    <h5 class="section-title">
                        <i class="fas fa-calendar-alt"></i>
                        Project Timeline & Budget
                    </h5>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">
                                <i class="fas fa-calendar-day"></i> Start Date
                            </label>
                            <input type="date"
                                   th:field="*{startDate}"
                                   class="form-control">
                        </div>

                        <div class="col-md-4 mb-3">
                            <label class="form-label">
                                <i class="fas fa-calendar-times"></i> End Date
                            </label>
                            <input type="date"
                                   th:field="*{endDate}"
                                   class="form-control">
                        </div>

                        <div class="col-md-4 mb-3">
                            <label class="form-label">
                                <i class="fas fa-dollar-sign"></i> Budget (DH)
                            </label>
                            <input type="number"
                                   step="0.01"
                                   th:field="*{budget}"
                                   class="form-control"
                                   placeholder="e.g., 50000.00"
                                   min="0">
                        </div>
                    </div>
                </div>

                <!-- Status & Service Provider -->
                <div class="form-section">
                    <h5 class="section-title">
                        <i class="fas fa-cogs"></i>
                        Status & Service Provider
                    </h5>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">
                                <i class="fas fa-flag"></i> Status
                            </label>
                            <select th:field="*{status}" class="form-select">
                                <option th:each="s : ${workStatuses}"
                                        th:value="${s}"
                                        th:text="${s}">
                                </option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">
                                <i class="fas fa-tools"></i> Service Provider (Optional)
                            </label>
                            <select th:field="*{prestataire.id}" class="form-select">
                                <option value="">No Service Provider</option>
                                <option th:each="p : ${prestataires}"
                                        th:value="${p.id}"
                                        th:text="${p.companyName}">
                                </option>
                            </select>
                            <small class="text-muted">Leave blank if not yet assigned</small>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i>Save Work Project
                    </button>
                    <a th:href="@{/admin/work-projects}" class="btn btn-secondary">
                        <i class="fas fa-times"></i>Cancel
                    </a>
                </div>
            </form>
        </div>
    </main>
</div>

<footer th:replace="~{fragments/AdminSidebar :: mini-footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin/admin-pages.js}"></script>
</body>
</html>
