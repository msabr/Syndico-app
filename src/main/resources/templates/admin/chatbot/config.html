<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/Header :: head}"></head>
<link rel="stylesheet" th:href="@{/css/admin/operations/genAssembliesSt.css}">

<body>

<header th:replace="~{fragments/Header :: header(activePage='none')}"></header>
<aside th:replace="~{fragments/AdminSidebar :: admin-sidebar(activePage='chatbot-config')}"></aside>

<div class="main-content">

    <div class="container-fluid px-4 py-4">
        <!-- Page Header -->
        <div class="page-header">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="mb-2"><i class="fas fa-robot me-2"></i>Chatbot Configuration</h2>
                    <p class="mb-0">Manage chatbot questions and answers</p>
                </div>
                <button class="btn btn-light btn-lg" data-bs-toggle="modal" data-bs-target="#createQAModal">
                    <i class="fas fa-plus me-2"></i>New Q&A
                </button>
            </div>
        </div>

        <!-- Alert Messages -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Statistics Cards -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="stat-card stat-card-primary position-relative">
                    <h6 class="text-uppercase mb-2">Total Q&As</h6>
                    <h3 class="mb-0" th:text="${statistics.totalQAs}">0</h3>
                    <i class="fas fa-comments stat-icon"></i>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card stat-card-success position-relative">
                    <h6 class="text-uppercase mb-2">Active</h6>
                    <h3 class="mb-0" th:text="${statistics.activeQAs}">0</h3>
                    <i class="fas fa-check-circle stat-icon"></i>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card stat-card-warning position-relative">
                    <h6 class="text-uppercase mb-2">Inactive</h6>
                    <h3 class="mb-0" th:text="${statistics.inactiveQAs}">0</h3>
                    <i class="fas fa-times-circle stat-icon"></i>
                </div>
            </div>
        </div>

        <!-- Search Section -->
        <div class="search-section">
            <form th:action="@{/admin/chatbot-config}" method="get" class="row g-3">
                <div class="col-md-10">
                    <input type="text" name="search" class="form-control"
                           placeholder="Search questions or answers..." th:value="${searchQuery}">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-search me-2"></i>Search
                    </button>
                </div>
            </form>
            <a th:href="@{/admin/chatbot-config}" class="btn btn-secondary btn-sm mt-2">
                <i class="fas fa-redo me-1"></i>Clear
            </a>
        </div>

        <!-- Q&A List -->
        <div th:if="${qas.isEmpty()}" class="text-center py-5">
            <i class="fas fa-robot fa-4x text-muted mb-3"></i>
            <p class="text-muted">No Q&As configured yet</p>
        </div>

        <div th:each="qa : ${qas}" class="qa-card">
            <div class="d-flex justify-content-between align-items-start mb-3">
                <div class="flex-grow-1">
                    <h6 class="mb-2">
                        <i class="fas fa-question-circle me-2 text-primary"></i>
                        <strong th:text="${qa.question}">Question</strong>
                    </h6>
                    <p class="mb-2 text-muted">
                        <i class="fas fa-reply me-2"></i>
                        <span th:text="${qa.answer}">Answer</span>
                    </p>
                    <div>
                        <span class="badge bg-info me-2" th:if="${qa.category != null}" th:text="${qa.category}">Category</span>
                        <span th:class="${qa.isActive ? 'badge badge-active' : 'badge badge-inactive'}">
                            <span th:text="${qa.isActive ? 'Active' : 'Inactive'}">Active</span>
                        </span>
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-sm btn-primary" data-bs-toggle="modal"
                            th:data-bs-target="'#editModal' + ${qa.id}">
                        <i class="fas fa-edit"></i>
                    </button>
                    <form method="post" th:action="@{/admin/chatbot-config/{id}/toggle(id=${qa.id})}"
                          style="display: inline;">
                        <button type="submit" class="btn btn-sm btn-warning">
                            <i th:class="${qa.isActive ? 'fas fa-eye-slash' : 'fas fa-eye'}"></i>
                        </button>
                    </form>
                    <form method="post" th:action="@{/admin/chatbot-config/delete/{id}(id=${qa.id})}"
                          style="display: inline;" onsubmit="return confirm('Delete this Q&A?');">
                        <button type="submit" class="btn btn-sm btn-danger">
                            <i class="fas fa-trash"></i>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Edit Modal -->
            <div class="modal fade" th:id="'editModal' + ${qa.id}" tabindex="-1">
                <div class="modal-dialog modal-lg">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Edit Q&A</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <form method="post" th:action="@{/admin/chatbot-config/update/{id}(id=${qa.id})}">
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label class="form-label">Question *</label>
                                    <input type="text" name="question" class="form-control"
                                           th:value="${qa.question}" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Answer *</label>
                                    <textarea name="answer" class="form-control" rows="4"
                                              th:text="${qa.answer}" required></textarea>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Category</label>
                                    <input type="text" name="category" class="form-control"
                                           th:value="${qa.category}" placeholder="e.g., Charges, Meetings, General">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Status</label>
                                    <select name="isActive" class="form-select">
                                        <option value="true" th:selected="${qa.isActive}">Active</option>
                                        <option value="false" th:selected="${!qa.isActive}">Inactive</option>
                                    </select>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                <button type="submit" class="btn btn-primary">Save Changes</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Create Q&A Modal -->
<div class="modal fade" id="createQAModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-plus me-2"></i>Create New Q&A</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form method="post" th:action="@{/admin/chatbot-config/create}">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Question *</label>
                        <input type="text" name="question" class="form-control" required
                               placeholder="e.g., What are the payment methods?">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Answer *</label>
                        <textarea name="answer" class="form-control" rows="4" required
                                  placeholder="You can pay by cash, check, bank transfer, or online via Stripe/PayPal."></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <input type="text" name="category" class="form-control"
                               placeholder="e.g., Payments, Charges, General, Meetings">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Status</label>
                        <select name="isActive" class="form-select">
                            <option value="true" selected>Active</option>
                            <option value="false">Inactive</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i>Create Q&A
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/AdminSidebar :: mini-footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin/admin-pages.js}"></script>
</body>
</html>
