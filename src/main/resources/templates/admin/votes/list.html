<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/Header :: head}"></head>
<link rel="stylesheet" th:href="@{/css/admin/operations/genAssembliesSt.css}">

<body>

<header th:replace="~{fragments/Header :: header(activePage='none')}"></header>
<aside th:replace="~{fragments/AdminSidebar :: admin-sidebar(activePage='votes')}"></aside>

<div class="main-content">

    <div class="container-fluid px-4 py-4">
        <!-- Page Header -->
        <div class="page-header">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="mb-2"><i class="fas fa-vote-yea me-2"></i>Votes Management</h2>
                    <p class="mb-0">Manage electronic voting</p>
                </div>
            </div>
        </div>

        <!-- Alert Messages -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Statistics Cards -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="stat-card stat-card-primary position-relative">
                    <h6 class="text-uppercase mb-2">Total Votes</h6>
                    <h3 class="mb-0" th:text="${statistics.totalVotes}">0</h3>
                    <i class="fas fa-poll stat-icon"></i>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card stat-card-success position-relative">
                    <h6 class="text-uppercase mb-2">Open Votes</h6>
                    <h3 class="mb-0" th:text="${statistics.openVotes}">0</h3>
                    <i class="fas fa-door-open stat-icon"></i>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card stat-card-warning position-relative">
                    <h6 class="text-uppercase mb-2">Closed</h6>
                    <h3 class="mb-0" th:text="${statistics.closedVotes}">0</h3>
                    <i class="fas fa-lock stat-icon"></i>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card stat-card-info position-relative">
                    <h6 class="text-uppercase mb-2">Total Responses</h6>
                    <h3 class="mb-0" th:text="${statistics.totalResponses}">0</h3>
                    <i class="fas fa-users stat-icon"></i>
                </div>
            </div>
        </div>

        <!-- Filter Section -->
        <div class="filter-section">
            <form th:action="@{/admin/votes}" method="get" class="row g-3">
                <div class="col-md-10">
                    <label class="form-label">Filter by Status</label>
                    <select name="status" class="form-select" onchange="this.form.submit()">
                        <option value="">All Statuses</option>
                        <option th:each="status : ${voteStatuses}"
                                th:value="${status}"
                                th:text="${status}"
                                th:selected="${status == selectedStatus}"></option>
                    </select>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <a th:href="@{/admin/votes}" class="btn btn-secondary w-100">
                        <i class="fas fa-redo me-2"></i>Clear
                    </a>
                </div>
            </form>
        </div>

        <!-- Votes Table -->
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0"><i class="fas fa-list me-2"></i>All Votes</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Question</th>
                            <th>Assembly</th>
                            <th>Voting Period</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${votes.isEmpty()}">
                            <td colspan="6" class="text-center py-4">
                                <i class="fas fa-inbox fa-3x text-muted mb-3"></i>
                                <p class="text-muted">No votes found</p>
                            </td>
                        </tr>
                        <tr th:each="vote : ${votes}">
                            <td><strong th:text="'#' + ${vote.id}">001</strong></td>
                            <td>
                                <strong th:text="${vote.question}">Vote Question</strong>
                                <br>
                                <small class="text-muted">
                                    Options: <span th:text="${#strings.listJoin(vote.options, ', ')}">OUI, NON</span>
                                </small>
                            </td>
                            <td>
                                    <span th:if="${vote.assemblyMeeting != null}"
                                          th:text="${vote.assemblyMeeting.title}">Assembly</span>
                                <span th:unless="${vote.assemblyMeeting != null}" class="text-muted">N/A</span>
                            </td>
                            <td>
                                <small>
                                    <i class="fas fa-calendar-alt me-1"></i>
                                    <span th:text="${#temporals.format(vote.startDate, 'dd/MM HH:mm')}">01/01 10:00</span>
                                    <br>
                                    <i class="fas fa-calendar-check me-1"></i>
                                    <span th:text="${#temporals.format(vote.endDate, 'dd/MM HH:mm')}">03/01 18:00</span>
                                </small>
                            </td>
                            <td>
                                    <span th:class="'badge badge-' + ${#strings.toLowerCase(vote.status)}"
                                          th:text="${vote.status}">OUVERT</span>
                            </td>
                            <td>
                                <div class="btn-group" role="group">
                                    <a th:href="@{/admin/votes/{id}/results(id=${vote.id})}"
                                       class="btn btn-sm btn-outline-info"
                                       title="View Results">
                                        <i class="fas fa-chart-bar"></i>
                                    </a>

                                    <form th:if="${vote.status.toString() == 'OUVERT'}"
                                          method="post"
                                          th:action="@{/admin/votes/{id}/close(id=${vote.id})}"
                                          style="display: inline;">
                                        <button type="submit" class="btn btn-sm btn-warning" title="Close Vote">
                                            <i class="fas fa-lock"></i>
                                        </button>
                                    </form>

                                    <form method="post"
                                          th:action="@{/admin/votes/delete/{id}(id=${vote.id})}"
                                          style="display: inline;"
                                          onsubmit="return confirm('Delete this vote?');">
                                        <button type="submit" class="btn btn-sm btn-outline-danger" title="Delete">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/AdminSidebar :: mini-footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin/admin-pages.js}"></script>
</body>
</html>
