<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/Header :: head}"></head>
<link rel="stylesheet" th:href="@{/css/admin/residents.css}">

<body>

<header th:replace="~{fragments/Header :: header(activePage='none')}"></header>
<aside th:replace="~{fragments/AdminSidebar :: admin-sidebar(activePage='apartments')}"></aside>

<div class="main-content">
    <main class="container-fluid">
        <!-- Page Header with Gradient -->
        <div class="page-header-gradient">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="page-title">
                        <i class="bi bi-door-closed"></i> Apartments Management
                    </h1>
                    <p class="page-subtitle">Manage all apartments in the syndicate</p>
                </div>
                <a th:href="@{/admin/apartments/new}" class="btn btn-primary btn-lg">
                    <i class="bi bi-plus-circle"></i> Add New Apartment
                </a>
            </div>
        </div>

        <!-- Alert Messages -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mt-3" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show mt-3" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Apartments Table Card -->
        <div class="card shadow-sm mt-4">
            <div class="card-body">
                <!-- Empty State -->
                <div th:if="${#lists.isEmpty(apartments)}" class="text-center py-5">
                    <i class="bi bi-inbox" style="font-size: 4rem; color: #999;"></i>
                    <h3 class="mt-3">No data available</h3>
                    <p class="text-muted">No apartments have been added yet. Start by adding your first apartment.</p>
                    <a th:href="@{/admin/apartments/new}" class="btn btn-primary mt-3">
                        <i class="bi bi-plus-circle"></i> Add First Apartment
                    </a>
                </div>

                <!-- Apartments Table -->
                <div th:unless="${#lists.isEmpty(apartments)}" class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                        <tr>
                            <th scope="col" class="text-center">#</th>
                            <th scope="col">Apartment #</th>
                            <th scope="col">Building</th>
                            <th scope="col" class="text-center">Floor</th>
                            <th scope="col" class="text-center">Surface (m²)</th>
                            <th scope="col" class="text-center">Rooms</th>
                            <th scope="col" class="text-center">Resident</th>
                            <th scope="col" class="text-center">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="apartment, iterStat : ${apartments}">
                            <td class="text-center" th:text="${iterStat.count}">1</td>
                            <td>
                                <strong th:text="${apartment.apartmentNumber}">101</strong>
                            </td>
                            <td th:text="${apartment.building.name}">Building A</td>
                            <td class="text-center">
                                <span class="badge bg-info" th:text="${apartment.floor}">1</span>
                            </td>
                            <td class="text-center" th:text="${apartment.surface}">75</td>
                            <td class="text-center" th:text="${apartment.numberOfRooms}">3</td>
                            <td class="text-center">
                                <span th:if="${apartment.resident != null}"
                                      th:text="${apartment.resident.user.firstName + ' ' + apartment.resident.user.lastName}"
                                      class="badge bg-success">John Doe</span>
                                <span th:unless="${apartment.resident != null}"
                                      class="badge bg-secondary">Vacant</span>
                            </td>
                            <td class="text-center">
                                <div class="btn-group" role="group">
                                    <a th:href="@{/admin/apartments/edit/{id}(id=${apartment.id})}"
                                       class="btn btn-sm btn-outline-warning"
                                       title="Edit Apartment">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{/admin/apartments/delete/{id}(id=${apartment.id})}"
                                       class="btn btn-sm btn-outline-danger"
                                       title="Delete Apartment"
                                       onclick="return confirm('Are you sure you want to delete this apartment?')">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<footer th:replace="~{fragments/AdminSidebar :: mini-footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
