<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="en">
<head th:replace="~{fragments/Header :: head}"></head>
<link rel="stylesheet" th:href="@{/css/admin/notifications.css}">

<body>

<header th:replace="~{fragments/Header :: header(activePage='none')}"></header>
<aside th:replace="~{fragments/AdminSidebar :: admin-sidebar(activePage='notifications')}"></aside>

    <div class="admin-container">

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-header">
                <h1><i class="fas fa-bell"></i> Notifications</h1>
                <div class="header-actions">
                    <span class="badge-count" th:if="${unreadCount > 0}" th:text="${unreadCount} + ' unread'"></span>
                    <form th:action="@{/admin/notifications/read-all}" method="post" style="display: inline;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-primary" th:disabled="${unreadCount == 0}">
                            <i class="fas fa-check-double"></i> Mark all as read
                        </button>
                    </form>
                </div>
            </div>

            <!-- Flash Messages -->
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="fas fa-check-circle"></i> <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-circle"></i> <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <!-- Notifications List -->
            <div class="notifications-container">
                <div th:if="${notifications.isEmpty()}" class="empty-state">
                    <i class="fas fa-bell-slash"></i>
                    <h3>No Notifications</h3>
                    <p>You don't have any notifications at the moment.</p>
                </div>

                <div th:unless="${notifications.isEmpty()}" class="notifications-list">
                    <div th:each="notification : ${notifications}"
                         class="notification-item"
                         th:classappend="${!notification.isRead ? 'notification-unread' : ''}">

                        <div class="notification-icon" th:classappend="${'icon-' + notification.type.name().toLowerCase()}">
                            <i th:class="${notification.type.name() == 'INFO' ? 'fas fa-info-circle' : (notification.type.name() == 'SUCCESS' ? 'fas fa-check-circle' : (notification.type.name() == 'WARNING' ? 'fas fa-exclamation-triangle' : (notification.type.name() == 'ERROR' ? 'fas fa-times-circle' : (notification.type.name() == 'PAYMENT' ? 'fas fa-credit-card' : (notification.type.name() == 'RECLAMATION' ? 'fas fa-file-alt' : (notification.type.name() == 'MEETING' ? 'fas fa-calendar-alt' : (notification.type.name() == 'VOTE' ? 'fas fa-vote-yea' : 'fas fa-bell')))))))}"></i>
                        </div>

                        <div class="notification-content">
                            <div class="notification-header">
                                <h4 th:text="${notification.title}">Notification Title</h4>
                                <span class="notification-time" th:text="${#temporals.format(notification.sentAt, 'dd/MM/yyyy HH:mm')}">
                                    12/12/2024 14:30
                                </span>
                            </div>
                            <p class="notification-message" th:text="${notification.message}">
                                Notification message content goes here...
                            </p>
                            <div class="notification-type-badge" th:text="${notification.type.name()}">INFO</div>
                        </div>

                        <div class="notification-actions">
                            <button th:if="${!notification.isRead}"
                                    class="btn-action btn-mark-read"
                                    th:attr="data-id=${notification.id}"
                                    title="Mark as read">
                                <i class="fas fa-check"></i>
                            </button>
                            <form th:action="@{/admin/notifications/{id}/delete(id=${notification.id})}"
                                  method="post"
                                  class="d-inline"
                                  onsubmit="return confirm('Are you sure you want to delete this notification?');">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn-action btn-delete" title="Delete">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <footer th:replace="~{fragments/AdminSidebar :: mini-footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        document.addEventListener('DOMContentLoaded', function() {
            const csrfToken = /*[[${_csrf.token}]]*/ '';
            const csrfHeader = /*[[${_csrf.headerName}]]*/ '';

            // Marquer comme lu avec AJAX
            document.querySelectorAll('.btn-mark-read').forEach(button => {
                button.addEventListener('click', function() {
                    const notificationId = this.getAttribute('data-id');
                    const notificationItem = this.closest('.notification-item');

                    fetch(`/admin/notifications/${notificationId}/read`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            [csrfHeader]: csrfToken
                        }
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'success') {
                            notificationItem.classList.remove('notification-unread');
                            this.remove();

                            // Update counter
                            const badge = document.querySelector('.badge-count');
                            if (badge) {
                                const currentCount = parseInt(badge.textContent);
                                const newCount = currentCount - 1;
                                if (newCount > 0) {
                                    badge.textContent = newCount + ' unread';
                                } else {
                                    badge.remove();
                                    document.querySelector('.btn-primary').disabled = true;
                                }
                            }
                        }
                    })
                    .catch(error => console.error('Error:', error));
                });
            });

            // Auto-dismiss alerts after 5 seconds
            setTimeout(function() {
                const alerts = document.querySelectorAll('.alert');
                alerts.forEach(alert => {
                    const bsAlert = new bootstrap.Alert(alert);
                    bsAlert.close();
                });
            }, 5000);
        });
        /*]]>*/
    </script>
</body>
</html>
