<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/Header :: head}"></head>
<link rel="stylesheet" th:href="@{/css/client/work/calendar.css}">

<body>

<header th:replace="~{fragments/Header :: header(activePage='none')}"></header>
<aside  th:replace="~{/fragments/ResidentSidebar :: resident-sidebar(activePage='calendar')}"></aside>

<div class="container-fluid">
    <div class="row">

        <!-- Main Content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div class="row">
                <!-- Calendar -->
                <div class="col-lg-8">
                    <div class="calendar-container">
                        <div class="calendar-header">
                            <button class="nav-btn" onclick="previousMonth()">
                                <i class="bi bi-chevron-left"></i>
                            </button>
                            <div class="month-year" id="monthYear">December 2025</div>
                            <button class="nav-btn" onclick="nextMonth()">
                                <i class="bi bi-chevron-right"></i>
                            </button>
                        </div>

                        <div class="calendar-grid">
                            <!-- Day Headers -->
                            <div class="day-header">Mon</div>
                            <div class="day-header">Tue</div>
                            <div class="day-header">Wed</div>
                            <div class="day-header">Thu</div>
                            <div class="day-header">Fri</div>
                            <div class="day-header">Sat</div>
                            <div class="day-header">Sun</div>

                            <!-- Calendar Days (will be generated by JS) -->
                            <div id="calendarDays"></div>
                        </div>

                        <!-- Legend -->
                        <div class="legend">
                            <div class="legend-item">
                                <div class="legend-dot" style="background: #007bff;"></div>
                                <span>General Assembly</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-dot" style="background: #ffc107;"></div>
                                <span>Maintenance</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-dot" style="background: #28a745;"></div>
                                <span>Votes</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-dot" style="background: #dc3545;"></div>
                                <span>Ongoing Works</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Events List -->
                <div class="col-lg-4">
                    <div class="events-sidebar">
                        <h4 class="mb-4" style="color: var(--dark);">
                            <i class="bi bi-calendar-event-fill"></i> Upcoming Events
                        </h4>

                        <!-- General Assembly Events -->
                        <div th:each="meeting : ${meetings}"
                             th:if="${meeting.scheduledDate.isAfter(T(java.time.LocalDateTime).now())}"
                             class="event-card meeting">
                            <div class="d-flex">
                                <div class="event-icon">
                                    <i class="bi bi-people-fill"></i>
                                </div>
                                <div>
                                    <h6 class="mb-1" th:text="${meeting.title}">General Assembly</h6>
                                    <p class="mb-1 text-muted small" th:text="${meeting.agenda}">Agenda</p>
                                    <div class="d-flex gap-2 text-muted small">
                                        <span><i class="bi bi-calendar"></i>
                                            <span th:text="${#temporals.format(meeting.scheduledDate, 'dd MMM, yyyy')}">Date</span>
                                        </span>
                                        <span><i class="bi bi-clock"></i>
                                            <span th:text="${#temporals.format(meeting.scheduledDate, 'HH:mm')}">Time</span>
                                        </span>
                                    </div>
                                    <span class="badge bg-primary mt-2">General Assembly</span>
                                </div>
                            </div>
                        </div>

                        <!-- Work Projects Events -->
                        <div th:each="project : ${workProjects}"
                             th:if="${project.startDate != null and project.startDate.isAfter(T(java.time.LocalDate).now())}"
                             class="event-card work">
                            <div class="d-flex">
                                <div class="event-icon">
                                    <i class="bi bi-hammer"></i>
                                </div>
                                <div>
                                    <h6 class="mb-1" th:text="${project.title}">Work Project</h6>
                                    <p class="mb-1 text-muted small" th:text="${project.description}">Description</p>
                                    <div class="d-flex gap-2 text-muted small">
                                        <span><i class="bi bi-calendar"></i>
                                            <span th:text="${#temporals.format(project.startDate, 'dd MMM')}">Start</span>
                                            <span th:if="${project.endDate != null}">
                                                - <span th:text="${#temporals.format(project.endDate, 'dd MMM')}">End</span>
                                            </span>
                                        </span>
                                    </div>
                                    <span class="badge mt-2"
                                          th:classappend="${project.status.name() == 'EN_COURS' ? 'bg-danger' : 'bg-warning'}"
                                          th:text="${project.status}">Status</span>
                                </div>
                            </div>
                        </div>

                        <!-- Reservations -->
                        <div th:each="reservation : ${reservations}"
                             th:if="${reservation.startDateTime.isAfter(T(java.time.LocalDateTime).now())}"
                             class="event-card maintenance">
                            <div class="d-flex">
                                <div class="event-icon">
                                    <i class="bi bi-bookmark-check-fill"></i>
                                </div>
                                <div>
                                    <h6 class="mb-1">
                                        <span th:text="${reservation.spaceType}">Space</span> Reservation
                                    </h6>
                                    <p class="mb-1 text-muted small" th:text="${reservation.notes}">Notes</p>
                                    <div class="d-flex gap-2 text-muted small">
                                        <span><i class="bi bi-calendar"></i>
                                            <span th:text="${#temporals.format(reservation.startDateTime, 'dd MMM, yyyy')}">Date</span>
                                        </span>
                                        <span><i class="bi bi-clock"></i>
                                            <span th:text="${#temporals.format(reservation.startDateTime, 'HH:mm')}">Start</span>
                                            - <span th:text="${#temporals.format(reservation.endDateTime, 'HH:mm')}">End</span>
                                        </span>
                                    </div>
                                    <span class="badge bg-success mt-2" th:text="${reservation.status}">Status</span>
                                </div>
                            </div>
                        </div>

                        <!-- No events message -->
                        <div th:if="${#lists.isEmpty(meetings) and #lists.isEmpty(workProjects) and #lists.isEmpty(reservations)}"
                             class="text-center text-muted py-4">
                            <i class="bi bi-calendar-x" style="font-size: 3rem;"></i>
                            <p class="mt-2">No upcoming events</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<footer th:replace="~{/fragments/ResidentSidebar :: mini-footer-resident}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    /*<![CDATA[*/
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();

    // Events data from backend
    const events = {};

    // Parse meetings from backend
    /*[[${meetings}]]*/ [].forEach(meeting => {
        const date = new Date(meeting.scheduledDate).toISOString().split('T')[0];
        events[date] = { type: 'meeting', title: meeting.title };
    });

    // Parse work projects from backend
    /*[[${workProjects}]]*/ [].forEach(project => {
        if (project.startDate) {
            const date = new Date(project.startDate).toISOString().split('T')[0];
            events[date] = { type: 'work', title: project.title };
        }
    });

    // Parse reservations from backend
    /*[[${reservations}]]*/ [].forEach(reservation => {
        const date = new Date(reservation.startDateTime).toISOString().split('T')[0];
        events[date] = { type: 'maintenance', title: 'Reservation' };
    });
    /*]]>*/

    function renderCalendar() {
        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
            'July', 'August', 'September', 'October', 'November', 'December'];

        document.getElementById('monthYear').textContent = `${monthNames[currentMonth]} ${currentYear}`;

        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();

        const today = new Date();
        const isCurrentMonth = today.getMonth() === currentMonth && today.getFullYear() === currentYear;
        const todayDate = today.getDate();

        let calendarHTML = '';

        // Adjust for Monday start (ISO week)
        const startDay = firstDay === 0 ? 6 : firstDay - 1;

        // Previous month days
        for (let i = startDay - 1; i >= 0; i--) {
            const day = daysInPrevMonth - i;
            calendarHTML += `<div class="day-cell other-month"><div class="day-number">${day}</div></div>`;
        }

        // Current month days
        for (let day = 1; day <= daysInMonth; day++) {
            const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const hasEvent = events[dateStr];
            const isToday = isCurrentMonth && day === todayDate;

            let classes = 'day-cell';
            if (isToday) classes += ' today';
            if (hasEvent) classes += ' has-event';

            calendarHTML += `<div class="${classes}"><div class="day-number">${day}</div></div>`;
        }

        // Next month days
        const totalCells = startDay + daysInMonth;
        const remainingCells = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);

        for (let day = 1; day <= remainingCells; day++) {
            calendarHTML += `<div class="day-cell other-month"><div class="day-number">${day}</div></div>`;
        }

        document.getElementById('calendarDays').innerHTML = calendarHTML;
    }

    function previousMonth() {
        currentMonth--;
        if (currentMonth < 0) {
            currentMonth = 11;
            currentYear--;
        }
        renderCalendar();
    }

    function nextMonth() {
        currentMonth++;
        if (currentMonth > 11) {
            currentMonth = 0;
            currentYear++;
        }
        renderCalendar();
    }

    // Initial render
    renderCalendar();
</script>
</body>
</html>
