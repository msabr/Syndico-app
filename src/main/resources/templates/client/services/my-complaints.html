<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/Header :: head}"></head>
<link rel="stylesheet" th:href="@{/css/client/profile/myComplaints.css}">

<body>

<header th:replace="~{fragments/Header :: header(activePage='none')}"></header>
<aside th:replace="~{/fragments/ResidentSidebar :: resident-sidebar(activePage='reclamations')}"></aside>

<div class="container-fluid">

    <div class="row">

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div class="page-header">
                <div class="row align-items-center">
                    <div class="col-md-8">
                        <h1 class="mb-2"><i class="bi bi-megaphone"></i> My Complaints</h1>
                        <p class="mb-0">Track and manage your service requests</p>
                    </div>
                    <div class="col-md-4 text-end">
                        <a th:href="@{/client/new-complaint}" class="new-complaint-btn">
                            <i class="bi bi-plus-circle"></i> New Complaint
                        </a>
                    </div>
                </div>
            </div>

            <!-- Success/Error Messages -->
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mt-3" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i>
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show mt-3" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="stats-grid">
                <div class="stat-box active">
                    <i class="bi bi-hourglass-split"></i>
                    <h3 class="mb-0" th:text="${statistics['pending'] + statistics['inProgress']}">0</h3>
                    <small class="text-muted">Active</small>
                </div>
                <div class="stat-box resolved">
                    <i class="bi bi-check-circle"></i>
                    <h3 class="mb-0" th:text="${statistics['resolved']}">0</h3>
                    <small class="text-muted">Resolved</small>
                </div>
                <div class="stat-box total">
                    <i class="bi bi-list-ul"></i>
                    <h3 class="mb-0" th:text="${statistics['total']}">0</h3>
                    <small class="text-muted">Total</small>
                </div>
            </div>

            <!-- Empty State -->
            <div th:if="${#lists.isEmpty(complaints)}" class="text-center py-5">
                <i class="bi bi-inbox" style="font-size: 4rem; color: #999;"></i>
                <h3 class="mt-3">No Complaints Found</h3>
                <p class="text-muted">You don't have any complaints yet.</p>
                <a th:href="@{/client/new-complaint}" class="btn btn-primary mt-3">
                    <i class="bi bi-plus-circle"></i> Submit Your First Complaint
                </a>
            </div>

            <!-- Dynamic Complaints Loop -->
            <div th:each="complaint : ${complaints}"
                 class="complaint-card"
                 th:classappend="${complaint.priority.name().toLowerCase()}">
                <div class="d-flex justify-content-between mb-3">
                    <div>
                        <h5 class="mb-2" th:text="${complaint.title}">Complaint Title</h5>
                        <span class="category-badge me-2">
                            <i class="bi"
                               th:classappend="${complaint.category.name() == 'PLOMBERIE' ? 'bi-droplet' :
                                               (complaint.category.name() == 'ELECTRICITE' ? 'bi-lightning' :
                                               (complaint.category.name() == 'NETTOYAGE' ? 'bi-brush' :
                                               (complaint.category.name() == 'SECURITE' ? 'bi-shield' : 'bi-gear')))}"></i>
                            <span th:text="${complaint.category.name()}">Category</span>
                        </span>
                        <span class="priority-badge"
                              th:classappend="${'priority-' + complaint.priority.name().toLowerCase()}"
                              th:text="${complaint.priority.name() == 'URGENTE' ? 'Urgent' :
                                       (complaint.priority.name() == 'HAUTE' ? 'High Priority' :
                                       (complaint.priority.name() == 'MOYENNE' ? 'Normal' : 'Low'))}">
                            Priority
                        </span>
                    </div>
                    <span class="status-badge"
                          th:classappend="${'status-' + complaint.status.name().toLowerCase().replace('_', '-')}"
                          th:text="${complaint.status.name() == 'NOUVELLE' ? 'New' :
                                   (complaint.status.name() == 'EN_COURS' ? 'In Progress' :
                                   (complaint.status.name() == 'ASSIGNEE' ? 'Assigned' :
                                   (complaint.status.name() == 'RESOLUE' ? 'Resolved' : 'Closed')))}">
                        Status
                    </span>
                </div>
                <p class="text-muted" th:text="${complaint.description}">Description</p>
                <div class="d-flex gap-3 text-muted small">
                    <span>
                        <i class="bi bi-calendar"></i>
                        <span th:text="${#temporals.format(complaint.createdAt, 'MMM dd, yyyy')}">Date</span>
                    </span>
                    <span>
                        <i class="bi bi-hash"></i>
                        <span th:text="'#COMP-' + ${complaint.id}">ID</span>
                    </span>
                    <span th:if="${complaint.resolvedAt != null}">
                        <i class="bi bi-check-circle text-success"></i>
                        Resolved <span th:text="${#temporals.format(complaint.resolvedAt, 'MMM dd, yyyy')}">Date</span>
                    </span>
                </div>
                <button class="btn btn-sm mt-3"
                        th:classappend="${complaint.status.name() == 'RESOLUE' ? 'btn-secondary' : 'btn-primary'}">
                    View Details
                </button>
            </div>
        </main>
    </div>
</div>

<footer th:replace="~{/fragments/ResidentSidebar :: mini-footer-resident}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
