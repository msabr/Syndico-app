<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/Header :: head}"></head>
<link rel="stylesheet" th:href="@{/css/client/finfaci/notifications.css}">

<body>

<header th:replace="~{fragments/Header :: header(activePage='none')}"></header>
<aside  th:replace="~{/fragments/ResidentSidebar :: resident-sidebar(activePage='notifications')}"></aside>

<div class="container-fluid">
    <div class="row">

        <!-- Main Content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <!-- Page Header -->
            <div class="page-header">
                <div class="row align-items-center">
                    <div class="col-md-8">
                        <h1 class="mb-2"><i class="bi bi-bell-fill"></i> Notifications</h1>
                        <p class="mb-0">Stay updated with important building announcements</p>
                    </div>
                    <div class="col-md-4 text-end">
                        <form th:if="${unreadCount > 0}" th:action="@{/client/notifications/mark-all-read}" method="post" style="display: inline;">
                            <button type="submit" class="mark-all-read">
                                <i class="bi bi-check-all"></i> Mark All as Read
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Statistics -->
            <div class="notification-stats">
                <div class="stat-card total">
                    <i class="bi bi-bell"></i>
                    <h3 class="mb-0" th:text="${totalNotifications}">0</h3>
                    <small class="text-muted">Total Notifications</small>
                </div>
                <div class="stat-card unread">
                    <i class="bi bi-exclamation-circle"></i>
                    <h3 class="mb-0" th:text="${unreadCount}">0</h3>
                    <small class="text-muted">Unread</small>
                </div>
                <div class="stat-card today">
                    <i class="bi bi-calendar-check"></i>
                    <h3 class="mb-0" th:text="${todayCount}">0</h3>
                    <small class="text-muted">Today</small>
                </div>
            </div>

            <!-- Filter Tabs -->
            <div class="filter-tabs">
                <a th:href="@{/client/notifications}"
                   class="filter-btn"
                   th:classappend="${selectedType == null and !unreadOnly ? 'active' : ''}">
                    <i class="bi bi-list"></i> All Notifications
                </a>
                <a th:href="@{/client/notifications(unreadOnly=true)}"
                   class="filter-btn"
                   th:classappend="${unreadOnly ? 'active' : ''}">
                    <i class="bi bi-circle-fill"></i> Unread
                    <span class="notification-badge ms-1" th:text="${unreadCount}">0</span>
                </a>
                <a th:each="type : ${types}"
                   th:href="@{/client/notifications(type=${type})}"
                   class="filter-btn"
                   th:classappend="${selectedType == type ? 'active' : ''}">
                    <i th:class="${type.name() == 'PAYMENT'} ? 'bi bi-credit-card' :
                                  ${type.name() == 'CHARGE'} ? 'bi bi-receipt' :
                                  ${type.name() == 'RECLAMATION'} ? 'bi bi-exclamation-triangle' :
                                  ${type.name() == 'ASSEMBLY'} ? 'bi bi-people' :
                                  ${type.name() == 'WORK_PROJECT'} ? 'bi bi-tools' :
                                  ${type.name() == 'RESERVATION'} ? 'bi bi-calendar-check' :
                                  ${type.name() == 'DOCUMENT'} ? 'bi bi-file-earmark' :
                                  ${type.name() == 'GENERAL'} ? 'bi bi-info-circle' :
                                  'bi bi-bell'"></i>
                    <span th:text="${type.name()}">Type</span>
                </a>
            </div>

            <!-- Notifications List -->
            <div class="notifications-container">
                <!-- No Notifications Message -->
                <div th:if="${#lists.isEmpty(notifications)}" class="alert alert-info text-center">
                    <i class="bi bi-bell"></i> No notifications to display.
                </div>

                <!-- Notifications Loop -->
                <div th:each="notification : ${notifications}"
                     class="notification-item"
                     th:classappend="${notification.type.name().toLowerCase()} + ' ' + ${!notification.isRead ? 'unread' : ''}"
                     th:attr="data-category=${notification.type.name().toLowerCase()}, data-read=${notification.isRead}">
                    <div th:if="${!notification.isRead}" class="unread-indicator"></div>
                    <div class="d-flex">
                        <div class="notification-icon">
                            <i th:class="${notification.type.name() == 'PAYMENT'} ? 'bi bi-cash-coin' :
                                         ${notification.type.name() == 'CHARGE'} ? 'bi bi-receipt' :
                                         ${notification.type.name() == 'RECLAMATION'} ? 'bi bi-exclamation-triangle-fill' :
                                         ${notification.type.name() == 'ASSEMBLY'} ? 'bi bi-people-fill' :
                                         ${notification.type.name() == 'WORK_PROJECT'} ? 'bi bi-tools' :
                                         ${notification.type.name() == 'RESERVATION'} ? 'bi bi-calendar-check-fill' :
                                         ${notification.type.name() == 'DOCUMENT'} ? 'bi bi-file-earmark-fill' :
                                         ${notification.type.name() == 'GENERAL'} ? 'bi bi-info-circle-fill' :
                                         'bi bi-bell-fill'"></i>
                        </div>
                        <div class="notification-content">
                            <div class="notification-title" th:text="${notification.title}">Title</div>
                            <div class="notification-message" th:text="${notification.message}">Message</div>
                            <div class="notification-meta">
                                <span>
                                    <i class="bi bi-clock"></i>
                                    <span th:text="${#temporals.format(notification.sentAt, 'dd MMM yyyy HH:mm')}">Date</span>
                                </span>
                                <span>
                                    <i class="bi bi-tag"></i>
                                    <span th:text="${notification.type.name()}">Type</span>
                                </span>
                            </div>
                            <div class="notification-actions" th:if="${!notification.isRead}">
                                <form th:action="@{/client/notifications/{id}/read(id=${notification.id})}"
                                      method="post"
                                      style="display: inline;">
                                    <button type="submit" class="action-btn secondary">
                                        <i class="bi bi-check"></i> Mark as Read
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<footer th:replace="~{/fragments/ResidentSidebar :: mini-footer-resident}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
